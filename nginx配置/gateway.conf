# ==================== 全局 SSL 参数（消除 protocol options redefined 警告） ====================
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;

# ==================== HTTP 强制跳转 HTTPS ====================
server {
    listen 80;
    server_name gzlawh.cn www.gzlawh.cn pay.gzlawh.cn portainer.gzlawh.cn
                aapi.gzlawh.cn capi.gzlawh.cn mapi.gzlawh.cn admin.gzlawh.cn;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== 主站/静态站点 (www.gzlawh.cn) ====================
server {
    listen 443 ssl;
    http2 on;
    server_name www.gzlawh.cn gzlawh.cn;

    ssl_certificate     /opt/multi-site/certs/www.gzlawh.cn.pem;
    ssl_certificate_key /opt/multi-site/certs/www.gzlawh.cn.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /opt/www;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ==================== 支付服务 (pay.gzlawh.cn) ====================
server {
    listen 443 ssl;
    http2 on;
    server_name pay.gzlawh.cn;

    ssl_certificate     /opt/multi-site/certs/pay.gzlawh.cn.pem;
    ssl_certificate_key /opt/multi-site/certs/pay.gzlawh.cn.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://lianpay:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

