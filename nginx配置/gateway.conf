# ==================== MAPI 服务 (mapi.gzlawh.cn) → clh-m-app:9030 ====================
server {
    listen 443 ssl;
    http2 on;
    server_name mapi.gzlawh.cn;

    ssl_certificate     /opt/multi-site/certs/mapi.gzlawh.cn.pem;
    ssl_certificate_key /opt/multi-site/certs/mapi.gzlawh.cn.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 根目录下的 .txt 文件直接从 /opt/txt 读取（如腾讯验证文件等）
    location ~ ^/([^/]+\.txt)$ {
        alias /opt/txt/;
        try_files $1 =404;
        default_type text/plain;
    }

    location / {
        proxy_pass http://clh-m-app:9030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

